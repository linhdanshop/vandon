```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xử Lý Vận Đơn</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* LOGIN */

#loginPage{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:380px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-login{
    background:#2196F3;
    color:white;
    font-weight:bold;
}

/* APP */

#appPage{
    display:none;
}

.header{
    background:white;
    padding:12px;
    position:sticky;
    top:0;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.header h3{
    margin-bottom:5px;
}

.stats{
    display:flex;
    gap:8px;
    overflow:auto;
}

.stat{
    background:#f0f0f0;
    padding:8px 12px;
    border-radius:8px;
    white-space:nowrap;
}

.container{
    padding:10px;
}

.card{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.08);
}

.code{
    font-size:18px;
    font-weight:bold;
    color:#2196F3;
}

.status{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    margin-top:5px;
    font-size:13px;
}

.red{
    background:#ffebee;
    color:#d32f2f;
}

.orange{
    background:#fff3e0;
    color:#f57c00;
}

.green{
    background:#e8f5e9;
    color:#2e7d32;
}

.card p{
    margin-top:8px;
}

.card button{
    margin-top:10px;
    background:#2196F3;
    color:white;
}
</style>
</head>

<body>

<div id="loginPage">

    <div class="login-box">
        <h2>Xử Lý Vận Đơn</h2>

        <input id="user" placeholder="Tên đăng nhập">

        <input id="pass"
               type="password"
               placeholder="Mật khẩu">

        <button class="btn-login"
                onclick="login()">
            Đăng nhập
        </button>
    </div>

</div>

<div id="appPage">

    <div class="header">

        <h3>Xin chào Admin</h3>

        <div class="stats">

            <div class="stat">
                Tổng: 128
            </div>

            <div class="stat">
                🔴 15
            </div>

            <div class="stat">
                🟡 8
            </div>

            <div class="stat">
                🟢 105
            </div>

        </div>

    </div>

    <div class="container">

        <div class="card">

            <div class="code">
                SPX123456789
            </div>

            <p>
                Hạ COD còn lại 35k
            </p>

            <div class="status orange">
                Đang xử lý
            </div>

            <p>
                ĐVVC:
                Đã gửi yêu cầu xuống bưu cục
            </p>

            <button>
                Chi tiết
            </button>

        </div>

        <div class="card">

            <div class="code">
                GHN987654321
            </div>

            <p>
                Giao sớm cho khách hối
            </p>

            <div class="status red">
                Chưa xử lý
            </div>

            <button>
                Chi tiết
            </button>

        </div>

    </div>

</div>

<script>

function login(){

    let user=document.getElementById("user").value;
    let pass=document.getElementById("pass").value;

    if(user==="admin" && pass==="123456"){

        document.getElementById("loginPage").style.display="none";

        document.getElementById("appPage").style.display="block";

    }else{

        alert("Sai tài khoản");

    }

}

</script>

</body>
</html>
```
