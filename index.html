<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xử lý vận đơn</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827;font-size:14px}
.login-page{height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:360px;background:white;border-radius:10px;padding:24px;box-shadow:0 2px 12px #0002}
.login-box h2{text-align:center;margin:0 0 20px}
input,textarea,select{width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
textarea{min-height:90px;resize:vertical}
button{border:0;border-radius:6px;padding:9px 12px;cursor:pointer;font-weight:600}
.btn-blue{background:#2563eb;color:white}
.btn-green{background:#16a34a;color:white}
.btn-red{background:#dc2626;color:white}
.btn-gray{background:#e5e7eb;color:#111827}
.btn-small{padding:6px 9px;font-size:13px}
.app{display:none}
.topbar{height:56px;background:#111827;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.topbar h2{font-size:18px;margin:0}
.main{padding:14px}
.toolbar{background:white;border-radius:8px;padding:12px;display:flex;gap:8px;align-items:center;margin-bottom:12px;box-shadow:0 1px 4px #0001}
.toolbar input,.toolbar select{max-width:220px}
.stats{display:flex;gap:8px;margin-bottom:12px}
.stat{background:white;border-radius:8px;padding:10px 14px;box-shadow:0 1px 4px #0001}
.table-wrap{background:white;border-radius:8px;overflow:auto;box-shadow:0 1px 4px #0001}
table{width:100%;border-collapse:collapse;min-width:1100px}
th,td{border-bottom:1px solid #e5e7eb;padding:9px;text-align:left;vertical-align:top}
th{background:#f9fafb;position:sticky;top:0;z-index:1}
tr:hover{background:#f9fafb}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700}
.red{background:#fee2e2;color:#b91c1c}
.yellow{background:#fef3c7;color:#92400e}
.green{background:#dcfce7;color:#166534}
.black{background:#e5e7eb;color:#111827}
.content-cell{max-width:280px;white-space:pre-wrap}
.modal{display:none;position:fixed;inset:0;background:#0008;z-index:10;align-items:center;justify-content:center;padding:20px}
.modal-box{background:white;width:min(920px,96vw);max-height:92vh;overflow:auto;border-radius:10px;padding:16px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-head h3{margin:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.quick button{background:#eef2ff;color:#1d4ed8;font-size:13px;padding:6px 8px}
.history{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:8px;max-height:180px;overflow:auto;white-space:pre-wrap}
.img-list{display:flex;gap:8px;flex-wrap:wrap}
.img-thumb{width:70px;height:70px;background:#e5e7eb;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-view{max-width:90vw;max-height:85vh;border-radius:8px;background:white}
.actions{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:800px){.grid{grid-template-columns:1fr}.toolbar{flex-wrap:wrap}.toolbar input,.toolbar select{max-width:none}.stats{overflow:auto}.topbar{height:auto;padding:10px;gap:8px;flex-wrap:wrap}}
</style>
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="login-box">
    <h2>Xử lý vận đơn</h2>
    <input id="loginUser" placeholder="Tài khoản" autocomplete="username">
    <br><br>
    <input id="loginPass" type="password" placeholder="Mật khẩu" autocomplete="current-password">
    <br><br>
    <button class="btn-blue" style="width:100%" onclick="login()">Đăng nhập</button>
    <p style="color:#6b7280;text-align:center;margin-bottom:0">Demo: admin / 123456</p>
  </div>
</div>

<div id="app" class="app">
  <div class="topbar">
    <h2>Xử lý vận đơn</h2>
    <div>
      <span id="helloUser"></span>
      <button class="btn-gray btn-small" onclick="logout()">Đăng xuất</button>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="btn-blue" onclick="openCreate()">+ Tạo phiếu</button>
      <input id="searchBox" placeholder="Tìm mã vận đơn / nội dung" oninput="render()">
      <select id="filterDvvc" onchange="render()">
        <option value="">Tất cả ĐVVC</option>
        <option value="chua_xu_ly">Chưa xử lý</option>
        <option value="dang_xu_ly">Đang xử lý</option>
        <option value="da_xu_ly">Đã xử lý</option>
        <option value="khong_xu_ly">Không xử lý được</option>
      </select>
      <select id="filterShop" onchange="render()">
        <option value="">Tất cả Shop</option>
        <option value="chua_xong">Chưa xong</option>
        <option value="da_xong">Đã xong</option>
      </select>
    </div>

    <div class="stats">
      <div class="stat">Tổng: <b id="stTotal">0</b></div>
      <div class="stat">🔴 Chưa xử lý: <b id="stRed">0</b></div>
      <div class="stat">🟡 Đang xử lý: <b id="stYellow">0</b></div>
      <div class="stat">🟢 Đã xử lý: <b id="stGreen">0</b></div>
      <div class="stat">Shop xong: <b id="stShop">0</b></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>STT</th>
            <th>Ngày ghi nhận</th>
            <th>Mã vận đơn</th>
            <th>Nội dung Shop</th>
            <th>Ảnh</th>
            <th>Tiến độ ĐVVC</th>
            <th>Nội dung ĐVVC</th>
            <th>Tiến độ Shop</th>
            <th>Lịch sử</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle">Tạo phiếu</h3>
      <button class="btn-gray" onclick="closeModal()">Đóng</button>
    </div>

    <div class="grid">
      <div>
        <label>Mã vận đơn</label>
        <input id="m_tracking" placeholder="Nhập mã vận đơn">
      </div>

      <div>
        <label>Ảnh</label>
        <input id="m_images" type="file" multiple accept="image/*">
      </div>

      <div class="full">
        <label>Nội dung Shop</label>
        <textarea id="m_shop"></textarea>
        <div class="quick" id="quickBox"></div>
      </div>

      <div>
        <label>Tiến độ ĐVVC</label>
        <select id="m_status_dvvc">
          <option value="chua_xu_ly">Chưa xử lý</option>
          <option value="dang_xu_ly">Đang xử lý</option>
          <option value="da_xu_ly">Đã xử lý</option>
          <option value="khong_xu_ly">Không xử lý được</option>
        </select>
      </div>

      <div>
        <label>Tiến độ Shop</label>
        <select id="m_status_shop">
          <option value="chua_xong">Chưa xong</option>
          <option value="da_xong">Đã xong</option>
        </select>
      </div>

      <div class="full">
        <label>Nội dung ĐVVC</label>
        <textarea id="m_dvvc"></textarea>
      </div>

      <div class="full">
        <label>Lịch sử thao tác</label>
        <div id="m_history" class="history"></div>
      </div>
    </div>

    <br>
    <div class="actions">
      <button class="btn-green" onclick="saveTask()">Lưu</button>
      <button class="btn-gray" onclick="copyTask()">Copy nội dung</button>
      <button id="deleteBtn" class="btn-red" onclick="deleteTask()">Xóa phiếu</button>
    </div>
  </div>
</div>

<div id="imgModal" class="modal" onclick="closeImg()">
  <img id="bigImg" class="img-view" alt="Ảnh">
</div>

<script>
const USERS = {
  admin: {pass:"123456", role:"admin", name:"Admin"},
  shop01: {pass:"123456", role:"shop", name:"Shop 01"},
  nhanvienjt01: {pass:"123456", role:"dvvc", name:"Nhân viên JT 01"}
};

const QUICK_TEXTS = [
  "Hạ COD còn lại 35k",
  "G1P",
  "Đổi thông tin giao hàng thành:",
  "Giao sớm cho khách hối",
  "Tạo đơn thu hồi từ khách về shop",
  "Shop báo chuyển hoàn",
  "Báo shipper giao lại",
  "Báo shipper cập nhật đơn hàng",
  "Khách đã trả ship, báo shipper cập nhật tiền",
  "Trả hàng về shop"
];

let currentUser = null;
let editId = null;

let tasks = [
  {
    id:"SPX123456789",
    created_at: Date.now(),
    tracking:"SPX123456789",
    shop:"Hạ COD còn lại 35k",
    dvvc:"Đã gửi yêu cầu xuống bưu cục",
    status_dvvc:"dang_xu_ly",
    status_shop:"chua_xong",
    images:[],
    history:["Shop 01 tạo phiếu"]
  },
  {
    id:"GHN987654321",
    created_at: Date.now()-3600000,
    tracking:"GHN987654321",
    shop:"Giao sớm cho khách hối",
    dvvc:"",
    status_dvvc:"chua_xu_ly",
    status_shop:"chua_xong",
    images:[],
    history:["Admin tạo phiếu"]
  }
];

function login(){
  const u = loginUser.value.trim();
  const p = loginPass.value;
  if(!USERS[u] || USERS[u].pass !== p){
    alert("Sai tài khoản hoặc mật khẩu");
    return;
  }
  currentUser = {username:u, ...USERS[u]};
  loginPage.style.display = "none";
  app.style.display = "block";
  helloUser.textContent = currentUser.name + " ";
  renderQuick();
  render();
}

function logout(){
  currentUser = null;
  app.style.display = "none";
  loginPage.style.display = "flex";
}

function formatTime(ts){
  const d = new Date(ts);
  return d.toLocaleString("vi-VN",{hour12:false});
}

function statusDvvcText(s){
  return {
    chua_xu_ly:"Chưa xử lý",
    dang_xu_ly:"Đang xử lý",
    da_xu_ly:"Đã xử lý",
    khong_xu_ly:"Không xử lý được"
  }[s] || s;
}

function statusShopText(s){
  return {chua_xong:"Chưa xong", da_xong:"Đã xong"}[s] || s;
}

function badgeDvvc(s){
  const cls = s==="chua_xu_ly" ? "red" : s==="dang_xu_ly" ? "yellow" : s==="da_xu_ly" ? "green" : "black";
  return `<span class="badge ${cls}">${statusDvvcText(s)}</span>`;
}

function badgeShop(s){
  return `<span class="badge ${s==="da_xong"?"green":"red"}">${statusShopText(s)}</span>`;
}

function render(){
  const q = searchBox.value.trim().toLowerCase();
  const fd = filterDvvc.value;
  const fs = filterShop.value;

  let list = tasks.filter(t => !t.deleted);
  if(q) list = list.filter(t =>
    t.tracking.toLowerCase().includes(q) ||
    t.shop.toLowerCase().includes(q) ||
    t.dvvc.toLowerCase().includes(q)
  );
  if(fd) list = list.filter(t => t.status_dvvc === fd);
  if(fs) list = list.filter(t => t.status_shop === fs);

  stTotal.textContent = tasks.filter(t=>!t.deleted).length;
  stRed.textContent = tasks.filter(t=>!t.deleted && t.status_dvvc==="chua_xu_ly").length;
  stYellow.textContent = tasks.filter(t=>!t.deleted && t.status_dvvc==="dang_xu_ly").length;
  stGreen.textContent = tasks.filter(t=>!t.deleted && t.status_dvvc==="da_xu_ly").length;
  stShop.textContent = tasks.filter(t=>!t.deleted && t.status_shop==="da_xong").length;

  tbody.innerHTML = list.map((t,i)=>`
    <tr onclick="openEdit('${t.id}')">
      <td>${i+1}</td>
      <td>${formatTime(t.created_at)}</td>
      <td><b style="color:#2563eb">${t.tracking}</b></td>
      <td class="content-cell">${escapeHtml(t.shop)}</td>
      <td>${t.images?.length ? `<button class="btn-small btn-gray" onclick="event.stopPropagation();showImg('${t.images[0]}')">📷 ${t.images.length}</button>` : ""}</td>
      <td>${badgeDvvc(t.status_dvvc)}</td>
      <td class="content-cell">${escapeHtml(t.dvvc || "")}</td>
      <td>${badgeShop(t.status_shop)}</td>
      <td>${t.history?.length || 0}</td>
      <td><button class="btn-small btn-blue" onclick="event.stopPropagation();openEdit('${t.id}')">Sửa</button></td>
    </tr>
  `).join("");
}

function renderQuick(){
  quickBox.innerHTML = QUICK_TEXTS.map(x=>`<button type="button" onclick="addQuick('${x.replaceAll("'","\\'")}')">${x}</button>`).join("");
}

function addQuick(txt){
  const old = m_shop.value.trim();
  m_shop.value = old ? old + "\n" + txt : txt;
}

function openCreate(){
  editId = null;
  modalTitle.textContent = "Tạo phiếu";
  m_tracking.disabled = false;
  m_tracking.value = "";
  m_shop.value = "";
  m_dvvc.value = "";
  m_status_dvvc.value = "chua_xu_ly";
  m_status_shop.value = "chua_xong";
  m_history.textContent = "";
  m_images.value = "";
  deleteBtn.style.display = "none";
  taskModal.style.display = "flex";
}

function openEdit(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  editId = id;
  modalTitle.textContent = "Cập nhật phiếu";
  m_tracking.disabled = true;
  m_tracking.value = t.tracking;
  m_shop.value = t.shop;
  m_dvvc.value = t.dvvc || "";
  m_status_dvvc.value = t.status_dvvc;
  m_status_shop.value = t.status_shop;
  m_history.textContent = (t.history || []).join("\n");
  m_images.value = "";
  deleteBtn.style.display = currentUser.role === "admin" ? "inline-block" : "none";
  taskModal.style.display = "flex";
}

function closeModal(){
  taskModal.style.display = "none";
}

function saveTask(){
  const tracking = m_tracking.value.trim().toUpperCase();
  if(!tracking){
    alert("Chưa nhập mã vận đơn");
    return;
  }

  const now = Date.now();

  if(!editId){
    let old = tasks.find(t=>t.id===tracking && !t.deleted);
    if(old){
      alert("Mã vận đơn đã tồn tại. Bấm vào phiếu để cập nhật.");
      return;
    }
    tasks.unshift({
      id: tracking,
      created_at: now,
      tracking,
      shop: m_shop.value.trim(),
      dvvc: m_dvvc.value.trim(),
      status_dvvc: m_status_dvvc.value,
      status_shop: m_status_shop.value,
      images: [],
      history: [`${formatTime(now)} - ${currentUser.name} tạo phiếu`]
    });
  }else{
    const t = tasks.find(x=>x.id===editId);
    const changes = [];

    if(t.shop !== m_shop.value.trim()) changes.push("sửa nội dung Shop");
    if(t.dvvc !== m_dvvc.value.trim()) changes.push("sửa nội dung ĐVVC");
    if(t.status_dvvc !== m_status_dvvc.value) changes.push(`ĐVVC: ${statusDvvcText(t.status_dvvc)} -> ${statusDvvcText(m_status_dvvc.value)}`);
    if(t.status_shop !== m_status_shop.value) changes.push(`Shop: ${statusShopText(t.status_shop)} -> ${statusShopText(m_status_shop.value)}`);

    t.shop = m_shop.value.trim();
    t.dvvc = m_dvvc.value.trim();
    t.status_dvvc = m_status_dvvc.value;
    t.status_shop = m_status_shop.value;
    t.updated_at = now;

    if(changes.length){
      t.history.push(`${formatTime(now)} - ${currentUser.name}: ${changes.join("; ")}`);
    }
  }

  closeModal();
  render();
}

function deleteTask(){
  if(currentUser.role !== "admin") return;
  if(!confirm("Xóa phiếu này?")) return;
  const t = tasks.find(x=>x.id===editId);
  if(t){
    t.deleted = true;
    t.history.push(`${formatTime(Date.now())} - ${currentUser.name} xóa phiếu`);
  }
  closeModal();
  render();
}

function copyTask(){
  const txt = `Mã vận đơn: ${m_tracking.value}\nNội dung Shop:\n${m_shop.value}\n\nNội dung ĐVVC:\n${m_dvvc.value}`;
  navigator.clipboard.writeText(txt).then(()=>alert("Đã copy"));
}

function showImg(src){
  bigImg.src = src;
  imgModal.style.display = "flex";
}

function closeImg(){
  imgModal.style.display = "none";
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
</script>
</body>
</html>
